# Dexelect web UI — nginx reverse proxy (reference).
#
# Subdomain approach (recommended — keeps Dexelect URL-agnostic; a subpath would
# require rewriting asset URLs). Point dexelect.example.net at this server, drop
# this file in your sites-available/ and symlink it into sites-enabled/, then
# add TLS with certbot (`certbot --nginx -d dexelect.example.net`).
#
# gunicorn from dexelect.service listens on 127.0.0.1:8765; nginx proxies the app
# and serves the sprite PNGs directly off disk (keeping them off the Python
# workers). Adjust the alias path to your Dexelect checkout.
#
# DoS protection: /api/generate is CPU-bound (a crafted config can spend the
# full generation time budget — see core.GENERATION_TIME_BUDGET_S — before
# failing), so it is rate-limited per client IP below. The limit_req_zone lives
# in the http context; on a stock Debian/Ubuntu nginx this file is included from
# inside `http { include .../sites-enabled/*; }`, so declaring it here at file
# scope is correct. If your nginx includes this file somewhere else, move the
# limit_req_zone line into your http block instead.

limit_req_zone $binary_remote_addr zone=dexelect_gen:10m rate=1r/s;

server {
    listen 80;
    server_name dexelect.example.net;

    # Rate-limited requests get 429 (Too Many Requests) rather than the 503 default.
    limit_req_status 429;

    # Hardening (audit 2026-07-11):
    # - nosniff: stop browsers MIME-sniffing JSON/static responses into something
    #   executable. `always` so it's also sent on 4xx/5xx responses.
    # - server_tokens off: don't advertise the nginx version in the Server
    #   header / error pages (cosmetic, but free).
    # NB: nginx add_header is inherited by a location block ONLY if that block
    # declares no add_header of its own — if you ever add one below, repeat the
    # nosniff line there.
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;

    # Serve sprite PNGs straight from the repo checkout — bypasses gunicorn.
    location /sprites/ {
        alias /home/youruser/apps/dexelect/assets/sprites/;
        access_log off;
        expires 30d;
    }

    # The one expensive endpoint: throttle to ~1 generation/sec per IP, with a
    # small burst so a human clicking Generate a few times isn't blocked but a
    # flood can't saturate the gunicorn workers.
    location = /api/generate {
        limit_req zone=dexelect_gen burst=5 nodelay;
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
