name: Bug report (web app)
description: Report a bug in the Dexelect web app
labels: ["bug", "web"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Firefox on Windows
